<header class="topbar border-b border-slate-200/80 bg-white/80 px-5 py-4 backdrop-blur-md">
  <div>
    <p class="kicker text-[11px] uppercase tracking-[0.2em] text-slate-500">{{ activePageCaption }}</p>
    <h2 class="mt-1 text-2xl font-bold tracking-tight text-slate-900">{{ activePageLabel }}</h2>
  </div>

  <div class="topbar-right min-w-0">
    <div class="status inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-700 shadow-sm" [ngClass]="statusClass()">
      <span class="dot"></span>
      <span>{{ statusText }}</span>
    </div>

    <div class="connection grid grid-cols-1 gap-2 lg:grid-cols-2">
      <label>
        <span class="label text-[11px] uppercase tracking-[0.2em] text-slate-500">API Base</span>
        <input
          class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-teal-400 focus:ring-2 focus:ring-teal-100"
          [(ngModel)]="apiBaseDraft"
          (change)="emitApiBaseChange()"
          [disabled]="streaming" />
      </label>
      <label>
        <span class="label text-[11px] uppercase tracking-[0.2em] text-slate-500">Session ID</span>
        <input
          class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-teal-400 focus:ring-2 focus:ring-teal-100"
          [(ngModel)]="sessionIdDraft"
          (change)="emitSessionIdChange()"
          [disabled]="streaming" />
      </label>
    </div>

    <div class="row mt-2 justify-end">
      <button type="button" (click)="openControls()">Control Center</button>
      <button type="button" (click)="openPortal()">Client Portal</button>
    </div>
  </div>
</header>
